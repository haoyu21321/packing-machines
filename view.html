<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打包机设备查看</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f2f5; color: #222; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: #1a3a6b; color: #fff; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .topbar-right { font-size: 12px; opacity: .8; }
  .toolbar { background: #fff; padding: 12px 24px; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 400px; }
  .search-wrap input { width: 100%; padding: 7px 12px 7px 34px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; outline: none; }
  .search-wrap input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.2); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
  .filter-select { padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; outline: none; background: #fff; }
  .count-badge { background: #eff6ff; color: #1d4ed8; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .table-wrap { flex: 1; overflow: auto; padding: 16px 24px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); min-width: 1000px; }
  thead tr { background: #1a3a6b; color: #fff; }
  thead th { padding: 10px; text-align: left; font-size: 12px; font-weight: 600; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f3f4f6; transition: background .1s; }
  tbody tr:hover { background: #eff6ff; }
  tbody td { padding: 8px 10px; vertical-align: middle; font-size: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-ok   { background: #dcfce7; color: #166534; }
  .badge-warn { background: #fef9c3; color: #854d0e; }
  .badge-err  { background: #fee2e2; color: #991b1b; }
  .badge-off  { background: #f3f4f6; color: #6b7280; }
  .mono { font-family: monospace; font-size: 11px; }
  .dept-text { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { text-align: center; padding: 60px; color: #9ca3af; }
  .loading { text-align: center; padding: 80px; color: #6b7280; font-size: 14px; }
  .readonly-tip { background: #fffbeb; border-bottom: 1px solid #fde68a; padding: 8px 24px; font-size: 12px; color: #92400e; flex-shrink: 0; }
  .tabs { background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; padding: 0 24px; flex-shrink: 0; }
  .tab { padding: 10px 18px; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; color: #6b7280; }
  .tab.active { border-bottom-color: #3b82f6; color: #1d4ed8; font-weight: 500; }
  .ping-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  .ping-ok   { background: #22c55e; }
  .ping-fail { background: #ef4444; }
  .ping-wait { background: #d1d5db; }
  .ping-ing  { background: #f59e0b; animation: blink .8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>

<div class="topbar">
  <h1>🖥 打包机设备查看</h1>
  <div class="topbar-right" id="updateTime">加载中…</div>
</div>
<div class="readonly-tip">👁 只读模式，如需修改请联系 IT 运维</div>
<div class="tabs">
  <div class="tab active" id="tab-devices" onclick="switchTab('devices')">🖥 设备列表</div>
  <div class="tab" id="tab-ping" onclick="switchTab('ping')">📡 Ping 检测</div>
</div>
<div class="toolbar" id="panel-toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索负责人、IP、MAC地址、资产编号…" oninput="renderTable()">
  </div>
  <select class="filter-select" id="filterType" onchange="renderTable()">
    <option value="">全部类型</option>
    <option value="MAC-mini">MAC-mini</option>
    <option value="MAC PRO">MAC PRO</option>
    <option value="服务器">服务器</option>
    <option value="windows台式机">Windows台式机</option>
  </select>
  <select class="filter-select" id="filterStatus" onchange="renderTable()">
    <option value="">全部状态</option>
    <option value="正常运行">正常运行</option>
    <option value="故障中">故障中</option>
    <option value="维修中">维修中</option>
    <option value="闲置">闲置</option>
    <option value="已下线">已下线</option>
  </select>
  <span class="count-badge" id="countBadge">共 0 台</span>
</div>

<div class="table-wrap" id="panel-devices">
  <div class="loading" id="loadingState">⏳ 加载数据中…</div>
  <table id="mainTable" style="display:none">
    <thead>
      <tr>
        <th>机房编号</th>
        <th>设备类型</th>
        <th>负责人</th>
        <th>资产挂名</th>
        <th>IP 地址</th>
        <th>MAC 地址</th>
        <th>资产编号</th>
        <th>序列号</th>
        <th>所属部门</th>
        <th>业务类型</th>
        <th>存放位置</th>
        <th>操作系统</th>
        <th>空闲时间</th>
        <th>状态</th>
        <th>注意事项</th>
        <th>备注</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none">没有找到匹配的设备</div>
</div>

<!-- Ping 检测面板 -->
<div class="table-wrap" id="panel-ping" style="display:none">
  <div style="margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="pingAll()" id="btnPingAll">📡 一键检测全部</button>
    <div style="position:relative;flex:1;min-width:200px;max-width:360px">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#9ca3af">🔍</span>
      <input type="text" id="pingSearch" placeholder="搜索负责人、IP、机房编号…" oninput="renderPingTable()"
        style="width:100%;padding:7px 12px 7px 34px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none">
    </div>
    <span id="pingStatus" style="font-size:12px;color:#6b7280"></span>
  </div>
  <table style="min-width:800px">
    <thead>
      <tr>
        <th>在线状态</th>
        <th>延迟</th>
        <th>机房编号</th>
        <th>设备类型</th>
        <th>负责人</th>
        <th>IP 地址</th>
        <th>存放位置</th>
        <th>业务类型</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="pingTableBody"></tbody>
  </table>
</div>

<script>
let devices = [];
const PING_SERVER = 'http://10.1.58.240:7789';
let pingResults = {};

function switchTab(tab) {
  ['devices','ping'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`panel-${t}`).style.display = t === tab ? '' : 'none';
  });
  document.getElementById('panel-toolbar').style.display = tab === 'devices' ? '' : 'none';
  if (tab === 'ping') renderPingTable();
}

function renderPingTable() {
  const q = (document.getElementById('pingSearch')?.value || '').trim().toLowerCase();
  const list = q ? devices.filter(d =>
    [d.owner, d.ip, d.roomNo, d.type, d.location, d.biz].some(v => v && v.toLowerCase().includes(q))
  ) : devices;
  const tbody = document.getElementById('pingTableBody');
  tbody.innerHTML = list.map(d => {
    const r = pingResults[d.ip];
    let dot, latency;
    if (!d.ip) { dot = 'ping-wait'; latency = '无IP'; }
    else if (!r) { dot = 'ping-wait'; latency = '未检测'; }
    else if (r === 'checking') { dot = 'ping-ing'; latency = '检测中…'; }
    else if (r.alive) { dot = 'ping-ok'; latency = `${r.ms}ms`; }
    else { dot = 'ping-fail'; latency = '不通'; }
    return `
      <tr>
        <td><span class="ping-dot ${dot}"></span>${dot==='ping-ok'?'在线':dot==='ping-fail'?'离线':dot==='ping-ing'?'检测中':'未知'}</td>
        <td style="font-family:monospace;font-size:11px">${latency}</td>
        <td><b>${d.roomNo||''}</b></td>
        <td>${d.type||''}</td>
        <td style="color:#1a3a6b;font-weight:500">${d.owner||''}</td>
        <td style="font-family:monospace;font-size:11px">${d.ip||''}</td>
        <td>${d.location||''}</td>
        <td>${d.biz||''}</td>
        <td><button onclick="pingSingle('${d.ip}')" ${!d.ip?'disabled':''} style="padding:3px 8px;font-size:11px;border:none;border-radius:4px;background:#3b82f6;color:#fff;cursor:pointer">Ping</button></td>
      </tr>
    `;
  }).join('');
}

async function pingSingle(ip) {
  if (!ip) return;
  pingResults[ip] = 'checking';
  renderPingTable();
  try {
    const res = await fetch(`${PING_SERVER}/ping?ip=${ip}`, { signal: AbortSignal.timeout(5000) });
    pingResults[ip] = await res.json();
  } catch(e) {
    pingResults[ip] = { alive: false, ms: null };
    alert('连不上 ping 服务，请联系 IT 运维确认服务是否启动');
  }
  renderPingTable();
}

async function pingAll() {
  const q = (document.getElementById('pingSearch')?.value || '').trim().toLowerCase();
  const filtered = q ? devices.filter(d =>
    [d.owner, d.ip, d.roomNo, d.type, d.location, d.biz].some(v => v && v.toLowerCase().includes(q))
  ) : devices;
  const ips = [...new Set(filtered.map(d => d.ip).filter(ip => ip && ip.trim()))];
  if (ips.length === 0) return;
  ips.forEach(ip => pingResults[ip] = 'checking');
  renderPingTable();
  const btn = document.getElementById('btnPingAll');
  btn.disabled = true; btn.textContent = '检测中…';
  document.getElementById('pingStatus').textContent = `正在检测 ${ips.length} 个IP…`;
  try {
    const res = await fetch(`${PING_SERVER}/pingall?ips=${ips.join(',')}`, { signal: AbortSignal.timeout(30000) });
    const data = await res.json();
    Object.assign(pingResults, data);
    const ok = Object.values(data).filter(r => r.alive).length;
    document.getElementById('pingStatus').textContent = `检测完成：${ok} 在线 / ${ips.length - ok} 离线`;
  } catch(e) {
    ips.forEach(ip => { if (pingResults[ip] === 'checking') pingResults[ip] = { alive: false, ms: null }; });
    alert('连不上 ping 服务，请联系 IT 运维确认服务是否启动');
    document.getElementById('pingStatus').textContent = '';
  }
  btn.disabled = false; btn.textContent = '📡 一键检测全部';
  renderPingTable();
}

async function loadData() {
  try {
    const res = await fetch(`https://raw.githubusercontent.com/haoyu21321/packing-machines/main/data.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('数据文件不存在，请先从编辑端发布数据');
    const raw = await res.json();
    devices = Array.isArray(raw) ? raw : (raw.devices || []);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainTable').style.display = '';
    document.getElementById('updateTime').textContent = '数据已加载 · ' + new Date().toLocaleString('zh-CN');
    renderTable();
  } catch(e) {
    document.getElementById('loadingState').textContent = '⚠️ ' + e.message;
  }
}

function statusBadge(s) {
  const map = { '正常运行':'badge-ok','故障中':'badge-err','维修中':'badge-warn','闲置':'badge-off','已下线':'badge-off' };
  return `<span class="badge ${map[s]||'badge-off'}">${s||'未知'}</span>`;
}

function renderTable() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const fType = document.getElementById('filterType').value;
  const fStatus = document.getElementById('filterStatus').value;

  let list = devices.filter(d => {
    if (fType && d.type !== fType) return false;
    if (fStatus && d.status !== fStatus) return false;
    if (!q) return true;
    return [d.owner,d.assetOwner,d.ip,d.mac,d.assetNo,d.serial,d.roomNo,d.dept,d.biz,d.location].some(v => v && v.toLowerCase().includes(q));
  });

  document.getElementById('countBadge').textContent = `共 ${list.length} 台`;
  const tbody = document.getElementById('tableBody');

  if (list.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  document.getElementById('emptyState').style.display = 'none';

  tbody.innerHTML = list.map(d => `
    <tr>
      <td><b>${d.roomNo||''}</b></td>
      <td>${d.type||''}</td>
      <td><b style="color:#1a3a6b">${d.owner||''}</b></td>
      <td>${d.assetOwner||''}</td>
      <td class="mono">${d.ip||''}</td>
      <td class="mono" style="font-size:10px">${d.mac||''}</td>
      <td class="mono" style="font-size:10px">${d.assetNo||''}</td>
      <td class="mono" style="font-size:10px">${d.serial||''}</td>
      <td><div class="dept-text" title="${d.dept||''}">${d.dept||''}</div></td>
      <td>${d.biz||''}</td>
      <td>${d.location||''}</td>
      <td>${d.os||''}</td>
      <td style="font-size:11px">${d.idle||''}</td>
      <td>${statusBadge(d.status)}</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.notice||''}">${d.notice||''}</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d.remark||''}">${d.remark||''}</td>
    </tr>
  `).join('');
}

loadData();
</script>
</body>
</html>
